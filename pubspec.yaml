name: y_player
description:
  "YPlayer is an enhanced Flutter package that provides a high-performance YouTube
  video player widget with advanced features like adaptive streaming, audio-video sync,
  performance monitoring, and optimized buffering for lag-free playback"
version: 3.0.0+1
repository: https://github.com/ijashuzain/y_player

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.2.0
  media_kit_libs_video: ^1.0.6
  media_kit_video: ^1.3.0
  youtube_explode_dart: ^2.4.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
